name: Alpha Release

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: Build a fresh Windows artifact too
        required: false
        default: "false"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-alpha:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libudev-dev libusb-1.0-0-dev fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Verify syntax
        run: npm run check

      - name: Build Linux alpha artifacts
        run: npm run dist:linux:fedora

      - name: Upload Linux alpha artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opendeck-linux-alpha
          path: |
            dist/*.AppImage
            dist/*.rpm
            dist/latest-linux.yml

  build-windows-alpha:
    if: github.event_name == 'workflow_dispatch' && inputs.build_windows == 'true'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Electron native app dependencies
        run: npm run install:app-deps

      - name: Verify syntax
        run: npm run check

      - name: Build Windows alpha artifact
        run: npm run dist:win

      - name: Upload Windows alpha artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendeck-windows-alpha
          path: |
            dist/*.exe

  publish-github-prerelease:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux-alpha
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: opendeck-linux-alpha
          path: release-artifacts

      - name: Download latest Windows artifact from repository history
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request
          import zipfile

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          release_root = pathlib.Path("release-artifacts/windows")
          release_root.mkdir(parents=True, exist_ok=True)

          api_url = f"https://api.github.com/repos/{repo}/actions/artifacts?per_page=100"
          request = urllib.request.Request(
              api_url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json"
              }
          )

          with urllib.request.urlopen(request) as response:
              payload = json.load(response)

          artifacts = [
              artifact for artifact in payload.get("artifacts", [])
              if artifact.get("name") == "opendeck-windows-alpha" and not artifact.get("expired")
          ]

          if not artifacts:
              print("No reusable Windows artifact found. Continuing with Linux-only release assets.")
              raise SystemExit(0)

          artifact = artifacts[0]
          download_request = urllib.request.Request(
              artifact["archive_download_url"],
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json"
              }
          )

          zip_path = release_root / "windows-artifact.zip"
          with urllib.request.urlopen(download_request) as response, open(zip_path, "wb") as output_file:
              output_file.write(response.read())

          with zipfile.ZipFile(zip_path, "r") as archive:
              archive.extractall(release_root)

          zip_path.unlink()
          print(f"Downloaded Windows artifact {artifact['id']} from {artifact['created_at']}.")
          PY

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.rpm
            release-artifacts/**/*.exe
