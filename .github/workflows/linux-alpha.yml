name: Linux Alpha

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-fedora-alpha:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libudev-dev libusb-1.0-0-dev fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Verify syntax
        run: npm run check

      - name: Build Fedora alpha artifacts
        run: npm run dist:linux:fedora

      - name: Upload Linux alpha artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opendeck-linux-alpha
          path: |
            dist/*.AppImage
            dist/*.rpm
            dist/latest-linux.yml
